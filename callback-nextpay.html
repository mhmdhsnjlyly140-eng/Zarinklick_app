<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تأیید پرداخت - زرین‌کلیک</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; }
        body { background: #0b0e1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #141a2b; padding: 30px; border-radius: 24px; max-width: 420px; width: 100%; border: 1px solid #2a3457; text-align: center; color: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .header h2 { font-weight: 900; font-size: 24px; background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
        .loader { border: 4px solid #2a3457; border-top: 4px solid #f7971e; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .icon { font-size: 48px; margin: 10px 0; }
        .success .icon { color: #92fe9d; }
        .error .icon { color: #ff6b6b; }
        .msg { font-size: 16px; margin: 15px 0; color: #8892b0; }
        .btn { background: linear-gradient(135deg, #f7971e, #ffd200); color: #0b0e1a; border: none; padding: 12px 30px; border-radius: 16px; font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 15px; width: 100%; }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.97); }
        a { text-decoration: none; }
        .hidden { display: none; }
        .details { font-size: 13px; color: #4a5a7a; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>💰 زرین‌کلیک</h2></div>

    <div id="statusContainer">
        <div id="loadingStatus">
            <div class="loader"></div>
            <p class="msg">در حال تأیید پرداخت...</p>
        </div>

        <div id="successStatus" class="hidden success">
            <div class="icon">✅</div>
            <p class="msg" id="successMsg">پرداخت با موفقیت انجام شد!</p>
            <a href="https://zarinklick-chi.vercel.app"><button class="btn">بازگشت به برنامه</button></a>
        </div>

        <div id="errorStatus" class="hidden error">
            <div class="icon">❌</div>
            <p class="msg" id="errorMsg">پرداخت ناموفق بود.</p>
            <a href="https://zarinklick-chi.vercel.app"><button class="btn">بازگشت به برنامه</button></a>
        </div>
    </div>

    <div class="details">🔒 پرداخت امن از طریق نکست‌پی</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const trans_id = urlParams.get('trans_id');
const status = urlParams.get('status');

function showStatus(type, msg) {
    document.getElementById('loadingStatus').classList.add('hidden');
    if (type === 'success') {
        document.getElementById('successStatus').classList.remove('hidden');
        document.getElementById('successMsg').textContent = msg;
    } else {
        document.getElementById('errorStatus').classList.remove('hidden');
        document.getElementById('errorMsg').textContent = msg;
    }
}

async function verifyPayment() {
    try {
        const pending = JSON.parse(localStorage.getItem('pendingNextPay'));
        if (!pending) {
            showStatus('error', '❌ اطلاعات تراکنش یافت نشد.');
            return;
        }

        if (status === 'ok' && pending.trans_id === trans_id) {
            const users = JSON.parse(localStorage.getItem('users')) || {};
            const user = users[pending.email];
            if (user) {
                user.balance = (user.balance || 0) + pending.amount;
                user.history = user.history || [];
                user.history.push({
                    desc: `شارژ کیف پول (نکست‌پی) - ${pending.productName || ''}`,
                    amount: `+${pending.amount}`,
                    type: 'green',
                    time: new Date().toLocaleTimeString()
                });
                users[pending.email] = user;
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.removeItem('pendingNextPay');
                showStatus('success', `✅ ${pending.amount.toLocaleString()} تومان با موفقیت به کیف پول شما اضافه شد!`);
            } else {
                showStatus('error', '❌ کاربر یافت نشد.');
            }
        } else {
            localStorage.removeItem('pendingNextPay');
            showStatus('error', '❌ پرداخت ناموفق یا لغو شده است.');
        }
    } catch (error) {
        showStatus('error', '❌ خطا: ' + error.message);
    }
}

verifyPayment();
</script>
</body>
  </html>
